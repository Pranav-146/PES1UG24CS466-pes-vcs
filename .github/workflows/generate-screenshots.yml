name: Generate PES-VCS Screenshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc build-essential libssl-dev python3-pil

      - name: Generate command transcripts
        run: bash scripts/capture_phase_outputs.sh

      - name: Render PNG screenshots
        run: python3 tools/render_artifacts_to_png.py

      - name: Commit generated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add screenshots
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "artifacts: add generated phase screenshots"
            git push
          fi
